<section class="p-6">
  <!-- Theme Toggle -->
  <div class="flex justify-end mb-4">
    <button id="theme-toggle" class="px-4 py-2 bg-cyan-500 text-white rounded-lg">
      Toggle Theme
    </button>
  </div>

  <!-- Header -->
  <header class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-4">
      <!-- Logo -->
      <div class="relative">
        <svg class="w-12 h-12" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="#00d4ff" stroke-width="2" opacity="0.3" />
          <circle cx="24" cy="24" r="16" stroke="#00d4ff" stroke-width="2" />
          <path d="M24 8 L24 16 M24 32 L24 40 M8 24 L16 24 M32 24 L40 24" stroke="#00d4ff" stroke-width="2" />
          <circle cx="24" cy="24" r="6" fill="#00d4ff" />
          <circle cx="24" cy="24" r="3" fill="#0a0e17" />
        </svg>
        <div class="absolute inset-0 bg-cyan-400/20 rounded-full blur-xl"></div>
      </div>
      <div>
        <h1 id="dashboard-title" class="font-display text-2xl font-bold tracking-wider glow-text">
          AI TRAFFIC CONTROL
        </h1>
        <p id="city-name" class="text-cyan-400/70 text-sm tracking-widest">METRO CITY NETWORK</p>
      </div>
    </div>

    <!-- Status + Time -->
    <div class="flex items-center gap-6">
      <div id="welcome-message" class="hidden md:flex items-center gap-2 text-emerald-400">
        <span class="w-2 h-2 bg-emerald-400 rounded-full pulse-dot"></span>
        <span class="text-sm font-medium">System Status: All systems operational</span>
      </div>
      <div class="flex items-center gap-2 px-4 py-2 card rounded-lg">
        <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span id="live-time" class="font-display text-lg">--:--:--</span>
      </div>
    </div>
  </header>

  <!-- Stats Row -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="card rounded-xl p-5 animate-slide opacity-0">
      <p class="text-cyan-400/60 text-sm uppercase tracking-wider mb-1">Active Vehicles</p>
      <p id="stat-vehicles" class="font-display text-3xl font-bold">12,847</p>
      <p class="text-emerald-400 text-sm mt-1">+3.2% from avg</p>
    </div>

    <div class="card rounded-xl p-5 animate-slide opacity-0 delay-1">
      <p class="text-cyan-400/60 text-sm uppercase tracking-wider mb-1">Traffic Flow</p>
      <p id="stat-flow" class="font-display text-3xl font-bold">94%</p>
      <div class="w-32 h-2 rounded-full bg-[#1a2235] mt-2 overflow-hidden">
        <div class="h-full traffic-flow-bar rounded-full" style="width: 94%"></div>
      </div>
    </div>

    <div class="card rounded-xl p-5 animate-slide opacity-0 delay-2">
      <p class="text-cyan-400/60 text-sm uppercase tracking-wider mb-1">Active Signals</p>
      <p id="stat-signals" class="font-display text-3xl font-bold">2,156</p>
      <p class="text-cyan-400/60 text-sm mt-1">98.7% operational</p>
    </div>

    <div class="card rounded-xl p-5 animate-slide opacity-0 delay-3">
      <p class="text-cyan-400/60 text-sm uppercase tracking-wider mb-1">AI Optimizations</p>
      <p id="stat-ai" class="font-display text-3xl font-bold">847</p>
      <p class="text-emerald-400 text-sm mt-1">Today's adjustments</p>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="card rounded-xl p-6 animate-slide opacity-0 delay-4">
    <h2 class="font-display text-lg tracking-wider mb-4">Quick Actions</h2>
    <div class="space-x-2">
      <button class="px-4 py-2 bg-cyan-500 text-white rounded">Sync Signals</button>
      <button class="px-4 py-2 bg-emerald-500 text-white rounded">Emergency Mode</button>
      <button class="px-4 py-2 bg-amber-500 text-white rounded">Run Analytics</button>
      <button class="px-4 py-2 bg-purple-500 text-white rounded">AI Settings</button>
    </div>
  </div>
</section>
